name: Security & Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ── Job 1: Dependency vulnerability scan ─────────────────────────────────
  safety:
    name: Vulnerability Scan (Safety)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Safety
        run: pip install safety

      - name: Scan for known vulnerabilities
        run: safety check --full-report

  # ── Job 2: Static Application Security Testing (SAST) ────────────────────
  bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run SAST scan
        # -r  recursive  |  -ll  report medium & high severity only
        # -x  exclude virtual environments and test fixtures
        run: bandit -r . -ll -x ./.venv,./tests

  # ── Job 3: Code style ─────────────────────────────────────────────────────
  flake8:
    name: Code Style (Flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flake8
        run: pip install flake8

      - name: Check code style
        # E501 = line too long (relaxed to 120 chars for readability)
        run: flake8 . --count --max-line-length=120 --statistics

  # ── Job 4: Tests (runs only if a tests/ folder exists) ───────────────────
  pytest:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests/ directory found — skipping."
          fi
